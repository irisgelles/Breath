<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ee;
    --text: #14110f;
    --muted: #3d3530;
    --accent: #3a6b58;
    --circle-idle: #a09890;
    --circle-active: #a8c4b8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    letter-spacing: 0.05em;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(168,196,184,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(74,122,104,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 380px;
    padding: 2rem;
  }

  .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
  .screen.active { display: flex; }

  /* ── SOUND UNLOCK OVERLAY ── */
  #soundUnlock {
    position: fixed;
    inset: 0;
    background: rgba(245,242,238,0.96);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 1.5rem;
  }
  #soundUnlock p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: var(--text);
    letter-spacing: 0.06em;
    text-align: center;
    padding: 0 2rem;
  }
  #soundUnlock small {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .unlock-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #fff;
    background: var(--accent);
    border: none;
    padding: 1rem 2.5rem;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity 0.2s;
  }
  .unlock-btn:hover { opacity: 0.85; }

  /* ── IDLE ── */
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 2.6rem;
    letter-spacing: 0.12em;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 3.5rem;
    font-weight: 400;
  }

  .idle-circle-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    margin-bottom: 3rem;
    cursor: pointer;
  }
  .idle-ring {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    border: 1px solid rgba(58,107,88,0.3);
    animation: idlePulse 3s ease-in-out infinite;
  }
  .idle-ring-2 {
    position: absolute;
    inset: -36px;
    border-radius: 50%;
    border: 1px solid rgba(58,107,88,0.15);
    animation: idlePulse 3s ease-in-out infinite 0.5s;
  }
  @keyframes idlePulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.04); }
  }
  .idle-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #c8ddd6, var(--circle-idle));
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 8px 32px rgba(58,107,88,0.18), 0 2px 8px rgba(0,0,0,0.08);
  }
  .idle-circle:hover { transform: scale(1.04); }
  .idle-circle-label {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 400;
  }

  .session-info {
    text-align: center;
    margin-bottom: 3rem;
  }
  .session-info p {
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    line-height: 2.2;
    font-weight: 400;
  }
  .session-info span { color: var(--accent); font-weight: 400; }

  .dots-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 3.5rem;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--circle-idle); transition: background 0.4s; }
  .dot.done { background: var(--accent); }

  /* ── BREATHING ── */
  .breath-header { text-align: center; margin-bottom: 1.5rem; }
  .session-label {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-weight: 400;
  }
  .breath-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.08em;
  }

  .circle-container {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: 0;
    pointer-events: none;
    width: 100%;
    height: 100%;
  }

  .main-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #d4e6df, var(--circle-active));
    box-shadow: 0 8px 40px rgba(58,107,88,0.25), 0 2px 8px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .phase-label {
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.4s;
    font-weight: 400;
  }
  .phase-label.visible { opacity: 1; }

  .phrase {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.5rem;
    color: var(--text);
    letter-spacing: 0.06em;
    text-align: center;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    min-height: 2.2rem;
    margin-bottom: 1.5rem;
  }
  .phrase.visible { opacity: 1; transform: translateY(0); }

  .progress-bar-wrap {
    width: 140px;
    height: 1px;
    background: var(--circle-idle);
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }

  .sound-btn {
    background: none;
    border: 1px solid var(--circle-idle);
    cursor: pointer;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.2rem;
    padding: 0.45rem 1rem;
    transition: color 0.2s, border-color 0.2s;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    border-radius: 2px;
  }
  .sound-btn:hover { color: var(--text); border-color: var(--muted); }
  .sound-btn.on { color: var(--accent); border-color: var(--accent); }

  /* ── COMPLETE ── */
  .complete-circle {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #d4e6df, var(--circle-active));
    box-shadow: 0 8px 40px rgba(58,107,88,0.2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 2.5rem;
    animation: gentleFloat 3s ease-in-out infinite;
  }
  @keyframes gentleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .complete-icon { font-size: 1.8rem; opacity: 0.6; }
  .complete-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem; font-weight: 400;
    letter-spacing: 0.1em; color: var(--text);
    margin-bottom: 0.5rem;
  }
  .complete-phrase {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 1.15rem;
    color: var(--muted); margin-bottom: 3rem;
    letter-spacing: 0.06em;
  }
  .complete-sessions {
    font-size: 0.75rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 3rem; font-weight: 400;
  }

  .btn {
    font-family: 'Jost', sans-serif;
    font-weight: 400; font-size: 0.75rem;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); background: none;
    border: 1px solid var(--circle-idle);
    padding: 0.75rem 2rem; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    border-radius: 2px;
  }
  .btn:hover { color: var(--text); border-color: var(--muted); }
  .btn.primary { color: var(--accent); border-color: var(--accent); }
  .btn.primary:hover { color: var(--text); border-color: var(--text); }
  .btn-row { display: flex; gap: 1rem; }
</style>
</head>
<body>

<!-- Sound unlock overlay — shown once on first visit -->
<div id="soundUnlock">
  <p>Tap to begin your session</p>
  <button class="unlock-btn" onclick="unlockAudio()">Start</button>
  <small>Enables breathing sounds</small>
</div>

<div class="app">

  <!-- IDLE -->
  <div class="screen active" id="idle">
    <div class="title">Reset</div>
    <div class="subtitle">5 breaths · 5 times a day</div>
    <div class="idle-circle-wrap" onclick="startSession()">
      <div class="idle-ring"></div>
      <div class="idle-ring-2"></div>
      <div class="idle-circle"><span class="idle-circle-label">begin</span></div>
    </div>
    <div class="session-info">
      <p>Sessions today <span id="sessionsToday">0</span> of 5</p>
      <p>Streak <span id="streakCount">0</span> days</p>
    </div>
    <div class="dots-row">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
    </div>
  </div>

  <!-- BREATHING -->
  <div class="screen" id="breathing">
    <div class="breath-header">
      <div class="session-label">breath</div>
      <div class="breath-count" id="breathCount">1 of 5</div>
    </div>
    <div class="circle-container">
      <div class="ripple" id="ripple1"></div>
      <div class="ripple" id="ripple2"></div>
      <div class="main-circle" id="mainCircle">
        <span class="phase-label" id="phaseLabel"></span>
      </div>
    </div>
    <div class="phrase" id="phraseEl"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <button class="sound-btn on" id="soundBtn" onclick="toggleSound()">♪ sound on</button>
    <button class="btn" onclick="endSession()">end session</button>
  </div>

  <!-- COMPLETE -->
  <div class="screen" id="complete">
    <div class="complete-circle"><div class="complete-icon">◌</div></div>
    <div class="complete-title">Done.</div>
    <div class="complete-phrase">I am enough.</div>
    <div class="complete-sessions" id="completeSessions"></div>
    <div class="btn-row">
      <button class="btn" onclick="goHome()">home</button>
      <button class="btn primary" onclick="startSession()">again</button>
    </div>
  </div>

</div>

<script>
// ── Constants ──────────────────────────────────────────────────────
const PHRASE        = "I am enough.";
const TOTAL_BREATHS = 5;
const INHALE_MS     = 4000;
const HOLD_MS       = 1000;
const EXHALE_MS     = 6000;
const PAUSE_MS      = 1000;
const BREATH_TOTAL  = INHALE_MS + HOLD_MS + EXHALE_MS + PAUSE_MS;
const SCALE_MIN     = 0.58;
const SCALE_MAX     = 1.6;

// ── State ──────────────────────────────────────────────────────────
let currentBreath    = 0;
let breathTimer      = null;
let progressInterval = null;
let soundOn          = true;
let audioCtx         = null;
let audioUnlocked    = false;
let sessionData      = loadData();

// ── Audio unlock (CRITICAL for iOS + Chrome) ───────────────────────
// Both iOS Safari and Chrome require audio context to be created AND
// resumed inside a direct user gesture handler. We do this once via
// the overlay button, then audio works for the whole session.
function unlockAudio() {
  // Create context inside the tap handler
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Play a silent buffer — this is the magic that unlocks iOS
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(0);

  // Resume in case it was created suspended
  audioCtx.resume().then(() => { audioUnlocked = true; });

  // Hide overlay
  document.getElementById('soundUnlock').style.display = 'none';
}

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(startHz, endHz, durSec, volStart, volEnd) {
  if (!soundOn || !audioUnlocked) return;
  try {
    const ctx  = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    const now = ctx.currentTime;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(startHz, now);
    osc.frequency.linearRampToValueAtTime(endHz, now + durSec);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(volStart, now + 0.4);
    gain.gain.linearRampToValueAtTime(volEnd, now + durSec - 0.5);
    gain.gain.linearRampToValueAtTime(0, now + durSec);
    osc.start(now);
    osc.stop(now + durSec);
  } catch(e) { console.warn('Audio error:', e); }
}

function playInhale() { playTone(174, 246, INHALE_MS / 1000, 0.07, 0.09); }
function playHold()   { playTone(246, 246, HOLD_MS   / 1000, 0.05, 0.05); }
function playExhale() { playTone(246, 174, EXHALE_MS / 1000, 0.09, 0.03); }

function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById('soundBtn');
  btn.textContent = soundOn ? '♪ sound on' : '♪ sound off';
  btn.classList.toggle('on', soundOn);
}

// ── Persistence ────────────────────────────────────────────────────
function loadData() {
  try { const r = localStorage.getItem('resetApp'); if (r) return JSON.parse(r); } catch(e) {}
  return { sessions: [], lastDate: null, streak: 0 };
}
function saveData() {
  try { localStorage.setItem('resetApp', JSON.stringify(sessionData)); } catch(e) {}
}
function todayStr() { return new Date().toISOString().slice(0, 10); }
function sessionsToday() { const t = todayStr(); return sessionData.sessions.filter(s => s.date === t).length; }
function recordSession() {
  const today = todayStr();
  sessionData.sessions.push({ date: today, ts: Date.now() });
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (sessionData.lastDate === yesterday || sessionData.lastDate === today) {
    if (sessionData.lastDate !== today) sessionData.streak = (sessionData.streak || 0) + 1;
  } else { sessionData.streak = 1; }
  sessionData.lastDate = today;
  saveData();
}

// ── UI ─────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function updateIdleUI() {
  const n = sessionsToday();
  document.getElementById('sessionsToday').textContent = n;
  document.getElementById('streakCount').textContent = sessionData.streak || 0;
  for (let i = 0; i < 5; i++) document.getElementById('d' + i).classList.toggle('done', i < n);
}

// ── Animation ──────────────────────────────────────────────────────
const rs = document.createElement('style');
rs.textContent = `@keyframes rippleOut {
  0%   { opacity: 0.5; transform: scale(0.72); }
  100% { opacity: 0;   transform: scale(1.75); }
}`;
document.head.appendChild(rs);

function animateCircle(s0, s1, dur, easeFn) {
  const el = document.getElementById('mainCircle');
  const t0 = performance.now();
  (function tick(now) {
    let t = Math.min((now - t0) / dur, 1);
    el.style.transform = `scale(${s0 + (s1 - s0) * easeFn(t)})`;
    if (t < 1) requestAnimationFrame(tick);
  })(t0);
}
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut(t)   { return 1 - Math.pow(1-t, 3); }

function setPhase(text) {
  const el = document.getElementById('phaseLabel');
  el.classList.remove('visible');
  setTimeout(() => { el.textContent = text; el.classList.add('visible'); }, 150);
}

function showPhrase() {
  const el = document.getElementById('phraseEl');
  el.textContent = PHRASE;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), EXHALE_MS - 1000);
}

function pulseRipple() {
  const r1 = document.getElementById('ripple1');
  const r2 = document.getElementById('ripple2');
  [r1, r2].forEach(r => { r.style.animation = 'none'; r.offsetHeight; });
  r1.style.animation = 'rippleOut 2.8s ease-out forwards';
  setTimeout(() => { r2.style.animation = 'rippleOut 2.8s ease-out 0.6s forwards'; }, 0);
}

function startProgress() {
  const bar   = document.getElementById('progressBar');
  const total = BREATH_TOTAL * TOTAL_BREATHS;
  bar.style.width = (currentBreath * BREATH_TOTAL / total * 100) + '%';
  clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    const p = parseFloat(bar.style.width) || 0;
    if (p >= 100) { clearInterval(progressInterval); return; }
    bar.style.width = (p + 100 / (total / 100)) + '%';
  }, 100);
}

// ── Breath Cycle ───────────────────────────────────────────────────
function runBreath() {
  if (currentBreath >= TOTAL_BREATHS) { finishSession(); return; }
  document.getElementById('breathCount').textContent = `${currentBreath + 1} of ${TOTAL_BREATHS}`;
  startProgress();

  setPhase('inhale');
  animateCircle(SCALE_MIN, SCALE_MAX, INHALE_MS, easeInOut);
  playInhale();

  breathTimer = setTimeout(() => {
    setPhase('hold');
    playHold();

    breathTimer = setTimeout(() => {
      setPhase('exhale');
      animateCircle(SCALE_MAX, SCALE_MIN, EXHALE_MS, easeOut);
      playExhale();
      pulseRipple();
      showPhrase();

      breathTimer = setTimeout(() => {
        setPhase('');
        currentBreath++;
        breathTimer = setTimeout(runBreath, PAUSE_MS);
      }, EXHALE_MS);
    }, HOLD_MS);
  }, INHALE_MS);
}

// ── Session Control ────────────────────────────────────────────────
function startSession() {
  currentBreath = 0;
  document.getElementById('mainCircle').style.transform = `scale(${SCALE_MIN})`;
  document.getElementById('phraseEl').textContent = '';
  document.getElementById('phraseEl').classList.remove('visible');
  document.getElementById('progressBar').style.width = '0%';
  showScreen('breathing');
  setTimeout(runBreath, 700);
}

function finishSession() {
  clearAllTimers();
  recordSession();
  document.getElementById('completeSessions').textContent = `${sessionsToday()} of 5 sessions today`;
  showScreen('complete');
  updateIdleUI();
}

function endSession() { clearAllTimers(); showScreen('idle'); }
function goHome()     { showScreen('idle'); }
function clearAllTimers() { clearTimeout(breathTimer); clearInterval(progressInterval); }

updateIdleUI();
</script>
</body>
</html>
